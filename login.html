<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
}

/* Left side */
.left {
    width: 50%;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.left h1 {
    font-size: 40px;
}

.left p {
    opacity: 0.7;
}

/* Right side */
.right {
    width: 50%;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form-box {
    width: 300px;
}

.form-box h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-bottom: 2px solid #ccc;
    background: transparent;
}

input:focus {
    outline: none;
    border-bottom: 2px solid #000;
}

button {
    width: 100%;
    padding: 12px;
    background: #111;
    color: white;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

.link {
    margin-top: 10px;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="left">
    <h1>Welcome Back</h1>
    <p>Login to continue</p>
</div>

<div class="right">
    <div class="form-box">
        <h2>Login</h2>
        <form>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>
        <div class="link">
            Don't have an account? <a href="#">Sign Up</a>
        </div>
    </div>
</div>

</body>
</html>
