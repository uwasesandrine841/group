<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Sign Up</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
}

/* Left side */
.left {
    width: 50%;
    background: #222;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.left h1 {
    font-size: 40px;
}

/* Right side */
.right {
    width: 50%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form-box {
    width: 300px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-bottom: 2px solid #ccc;
}

input:focus {
    outline: none;
    border-bottom: 2px solid #000;
}

button {
    width: 100%;
    padding: 12px;
    background: #222;
    color: white;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

button:hover {
    background: #444;
}

.link {
    margin-top: 10px;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="left">
    <h1>Create Account</h1>
    <p>Join us today</p>
</div>

<div class="right">
    <div class="form-box">
        <h2>Sign Up</h2>
        <form>
            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <input type="password" placeholder="Confirm Password">
            <button type="submit">Sign Up</button>
        </form>
        <div class="link">
            Already have an account? <a href="#">Login</a>
        </div>
    </div>
</div>

</body>
</html>
